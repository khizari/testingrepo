<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Panel | Fast Food Menu</title>
    <link rel="icon" href="assets/images/favicon.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Catamaran:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="assets/css/admin.css" />
  </head>
  <body class="admin-locked">
    <section id="loginScreen" class="login-screen" aria-labelledby="loginTitle">
      <form id="loginForm" class="login-card">
        <span class="eyebrow">Admin Login</span>
        <h1 id="loginTitle">Menu Admin Panel</h1>
        <p>Email aur password enter karein, phir admin panel open hoga.</p>

        <label for="adminEmail">Username</label>
        <input
          id="adminEmail"
          type="text"
          placeholder="Enter admin username"
          autocomplete="username"
          required
        />

        <label for="adminPassword">Password</label>
        <div class="password-field">
          <input
            id="adminPassword"
            type="password"
            placeholder="Enter password"
            autocomplete="current-password"
            required
          />
          <button type="button" id="togglePassword" aria-label="Show password">
            <i class="fa-regular fa-eye" aria-hidden="true"></i>
          </button>
        </div>

        <p id="loginError" class="login-error" aria-live="polite"></p>

        <button type="submit" class="primary-btn login-btn">
          <i class="fa-solid fa-lock-open" aria-hidden="true"></i>
          Login
        </button>
      </form>
    </section>

    <header class="admin-header" hidden>
      <div>
        <span class="eyebrow">Fast Food Restaurant</span>
        <h1>Menu Admin Panel</h1>
      </div>
      <div class="header-actions">
        <span id="saveStatus" class="save-status" aria-live="polite"></span>
        <button type="button" id="saveChangesButton" class="primary-btn compact-btn">
          <i class="fa-solid fa-cloud-arrow-up" aria-hidden="true"></i>
          Save Changes
        </button>
        <button type="button" id="logoutButton" class="logout-btn">
          <i class="fa-solid fa-right-from-bracket" aria-hidden="true"></i>
          Logout
        </button>
        <a class="site-link" href="index.html#menu">
          <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
          Back to Menu
        </a>
      </div>
    </header>

    <main class="admin-shell" hidden>
      <section class="list-panel" aria-labelledby="listTitle">
        <div class="panel-heading list-heading">
          <div>
            <h2 id="listTitle">Menu Categories</h2>
            <p id="itemCount">0 items</p>
          </div>
          <button type="button" id="addCategoryButton" class="primary-btn compact-btn">
            <i class="fa-solid fa-layer-group" aria-hidden="true"></i>
            Add Category
          </button>
        </div>

        <div class="filter-row">
          <input id="searchInput" type="search" placeholder="Search category or item..." />
        </div>

        <div id="categoriesList" class="categories-list"></div>
      </section>
    </main>

    <dialog id="categoryDialog" class="edit-dialog">
      <form id="categoryForm" class="menu-form dialog-card">
        <input type="hidden" id="categoryId" />
        <div class="dialog-heading">
          <div>
            <span id="categoryDialogEyebrow" class="eyebrow">Add Category</span>
            <h2 id="categoryDialogTitle">Add Category</h2>
          </div>
          <button type="button" id="closeCategoryDialog" class="icon-btn" aria-label="Close category dialog">
            <i class="fa-solid fa-xmark" aria-hidden="true"></i>
          </button>
        </div>

        <label for="categoryName">Category Name</label>
        <input id="categoryName" type="text" placeholder="Pizza" required />

        <div class="form-actions">
          <button type="submit" class="primary-btn">
            <i class="fa-solid fa-floppy-disk" aria-hidden="true"></i>
            <span id="categorySubmitText">Save Category</span>
          </button>
          <button type="button" id="cancelCategory" class="secondary-btn">Cancel</button>
        </div>
      </form>
    </dialog>

    <dialog id="itemDialog" class="edit-dialog">
      <form id="itemForm" class="menu-form dialog-card">
        <input type="hidden" id="itemId" />

        <div class="dialog-heading">
          <div>
            <span id="itemDialogEyebrow" class="eyebrow">Add Product</span>
            <h2 id="itemDialogTitle">Add Menu Item</h2>
          </div>
          <button type="button" id="closeItemDialog" class="icon-btn" aria-label="Close item dialog">
            <i class="fa-solid fa-xmark" aria-hidden="true"></i>
          </button>
        </div>

        <label for="itemName">Product Name</label>
        <input id="itemName" type="text" required />

        <label for="itemPrice">Base Price</label>
        <input id="itemPrice" type="text" required />

        <div class="variants-section" style="margin-top: 15px; border-top: 1px solid #ddd; padding-top: 10px;">
          <h4>Sizes / Variants</h4>
          <div id="variantsList" style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px;"></div>
          <button type="button" id="addVariantBtn" class="secondary-btn" style="padding: 4px 8px; font-size: 0.9em;">+ Add Size</button>
        </div>

        <div class="addons-section" style="margin-top: 15px; border-top: 1px solid #ddd; padding-top: 10px; margin-bottom: 15px;">
          <h4>Add-ons (Extras)</h4>
          <div id="addonsList" style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px;"></div>
          <button type="button" id="addAddonBtn" class="secondary-btn" style="padding: 4px 8px; font-size: 0.9em;">+ Add Extra</button>
        </div>

        <label for="itemCategory">Category</label>
        <select id="itemCategory" required></select>

        <label for="itemImageFile">Upload Image</label>
        <input id="itemImageFile" type="file" accept="image/*" style="margin-bottom: 15px;" />
        <input id="itemImage" type="hidden" />

        <label for="itemDescription">Description</label>
        <textarea id="itemDescription" rows="5" required></textarea>

        <label for="itemRating">Rating</label>
        <input id="itemRating" type="number" min="0" max="5" step="0.5" />

        <label class="check-row" for="itemPopular">
          <input id="itemPopular" type="checkbox" />
          Show in Popular section
        </label>

        <div class="preview-card">
          <img id="itemImagePreview" src="assets/images/burger.png" alt="Selected menu item" />
          <div>
            <strong id="itemPreviewName">Product preview</strong>
            <span id="itemPreviewPrice">Rs. 0.00</span>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="primary-btn">
            <i class="fa-solid fa-floppy-disk" aria-hidden="true"></i>
            <span id="itemSubmitText">Save Item</span>
          </button>
          <button type="button" id="cancelItem" class="secondary-btn">Cancel</button>
        </div>
      </form>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="assets/js/menu-data.js"></script>
    <script src="assets/js/admin.js"></script>
  </body>
</html>
