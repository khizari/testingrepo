<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Checkout | Domino Fazilpur</title>
    <link rel="icon" href="assets/images/favicon.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Catamaran:wght@400;500;600;700;800&family=Dancing+Script:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/checkout.css" />
  </head>
  <body class="checkout-page">
    <header>
      <div class="container">
        <a href="index.html" id="logo">
          <img src="assets/images/Domino Fazilpur png logo.png" alt="Domino Fazilpur" />
        </a>
        <button class="nav-toggle" aria-label="Toggle menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <nav>
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#hot-deals">Hot Deals</a></li>
            <li><a href="index.html#about">About</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="index.html#testimonials">Testimonials</a></li>

            <li><a href="cart.html"><i class="fa-solid fa-cart-shopping"></i> Cart</a></li>
            <li><a href="index.html#order" class="btn">Contact Us</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="checkout-main">
      <div class="container">
        <div class="checkout-container">
          <div class="checkout-card">
            <div class="checkout-header">
              <h2>Almost there!</h2>
              <button class="close-checkout" onclick="window.location.href='cart.html'">
                <i class="fa-solid fa-xmark"></i>
              </button>
            </div>

            <div class="checkout-body">
              <div class="order-type-section">
                <label class="field-label">Order Type</label>
                <div class="order-type-grid">
                  <button class="order-type-btn" data-type="Delivery">Delivery</button>
                  <button class="order-type-btn" data-type="Pick-Up">Pick-Up</button>
                  <button class="order-type-btn" data-type="Car Hop">Car Hop</button>
                  <button class="order-type-btn active" data-type="Dine-In">Dine-In</button>
                </div>
              </div>

              <div class="checkout-field">
                <label for="checkoutName" class="field-label">Full Name</label>
                <input type="text" id="checkoutName" placeholder="e.g. Salman Adeeb Yasin" />
              </div>

              <div class="checkout-field">
                <label for="checkoutPhone" class="field-label">Phone Number</label>
                <input type="tel" id="checkoutPhone" placeholder="e.g. 0312534546" />
              </div>

              <div class="checkout-field" id="tableNumberGroup">
                <label for="checkoutTable" class="field-label">Table Number</label>
                <input type="text" id="checkoutTable" placeholder="e.g. 12" />
              </div>

              <div class="checkout-field" id="addressGroup" style="display: none;">
                <label for="checkoutAddress" class="field-label">Delivery Address</label>
                <input type="text" id="checkoutAddress" placeholder="e.g. House 12, Street 4, Fazilpur" />
              </div>

              <button id="continueToWhatsApp" class="whatsapp-btn">
                Continue to WhatsApp <i class="fa-solid fa-arrow-right"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="assets/js/menu-data.js"></script>
    <script src="assets/js/checkout.js"></script>
  </body>
</html>
