<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Admin Login — Bell N Tell</title>
<link rel="icon" href="/assets/favicon.ico?v=20260708b">
<style>
  :root {
    --brand: #e11d2e;
    --brand-dark: #b3141f;
    --bg: #f6f6f7;
    --text: #1c1c1e;
    --muted: #6b6b6f;
    --border: #e2e2e4;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 380px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    padding: 36px 32px;
    border: 1px solid var(--border);
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 22px;
  }
  .logo-badge {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: var(--brand);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 18px;
  }
  h1 {
    font-size: 18px;
    margin: 0;
  }
  p.subtitle {
    color: var(--muted);
    font-size: 14px;
    margin: 0 0 24px;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--text);
  }
  input {
    width: 100%;
    padding: 11px 13px;
    border-radius: 9px;
    border: 1px solid var(--border);
    font-size: 15px;
    margin-bottom: 16px;
    background: #fafafa;
  }
  input:focus {
    outline: none;
    border-color: var(--brand);
    background: #fff;
  }
  button {
    width: 100%;
    padding: 12px;
    border-radius: 9px;
    border: none;
    background: var(--brand);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover { background: var(--brand-dark); }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .error {
    background: #fdecec;
    color: #a8151a;
    border: 1px solid #f5c6c6;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13.5px;
    margin-bottom: 16px;
    display: none;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-badge">HS</div>
      <div>
        <h1>Bell N Tell Admin</h1>
      </div>
    </div>
    <p class="subtitle">Sign in to manage the menu, prices, and photos.</p>

    <div class="error" id="error-box"></div>

    <form id="login-form">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>

      <button type="submit" id="submit-btn">Sign In</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const errorBox = document.getElementById('error-box');
    const submitBtn = document.getElementById('submit-btn');

    // If already logged in, skip straight to the dashboard.
    fetch('/api/session').then(r => r.json()).then(data => {
      if (data.authenticated) window.location.href = '/admin/index.html';
    }).catch(() => {});

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in…';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');
        window.location.href = '/admin/index.html';
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
